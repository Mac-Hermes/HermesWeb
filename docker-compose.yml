version: "3.8"
services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./prisma/dev.db
      - JWT_SECRET=change-me
      - WHATSAPP_TOKEN=
      - WHATSAPP_PHONE_ID=
      - NEXT_PUBLIC_BASE_URL=http://localhost:3000
    restart: unless-stopped
